name: Installer integration

on:
  push:
  pull_request:

jobs:
  installer:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Installer smoke tests
        run: bash tests/install_smoke.sh
      - name: Full install, update, service, and uninstall test
        run: bash tests/install_integration.sh
