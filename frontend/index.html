<!doctype html>
<html lang="en" data-bs-theme="light">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Linux PAM Lite</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <link href="/static/styles.css" rel="stylesheet">
  </head>
  <body>
    <div id="loginView" class="login-shell">
      <main class="login-panel">
        <div class="brand-lock"><i class="bi bi-shield-lock"></i></div>
        <h1>Linux PAM Lite</h1>
        <p class="text-secondary">Privileged access workflow for Linux servers.</p>
        <form id="loginForm" class="vstack gap-3">
          <div>
            <label class="form-label" for="loginProvider">Provider</label>
            <select id="loginProvider" class="form-select">
              <option value="local">local</option>
              <option value="ldap">LDAP</option>
              <option value="oidc">OIDC</option>
            </select>
          </div>
          <div>
            <label class="form-label" for="loginUsername">Username</label>
            <input id="loginUsername" class="form-control" autocomplete="username" required>
          </div>
          <div>
            <label class="form-label" for="loginPassword">Password</label>
            <input id="loginPassword" class="form-control" type="password" autocomplete="current-password" required>
          </div>
          <button class="btn btn-primary w-100" type="submit"><i class="bi bi-box-arrow-in-right"></i> Sign in</button>
        </form>
        <form id="mfaLoginForm" class="vstack gap-3 d-none">
          <div class="alert alert-warning mb-0">MFA verification required.</div>
          <div>
            <label class="form-label" for="loginMfaCode">TOTP or recovery code</label>
            <input id="loginMfaCode" class="form-control" autocomplete="one-time-code">
          </div>
          <label class="form-check"><input id="loginRecoveryCode" class="form-check-input" type="checkbox"> <span class="form-check-label">Use recovery code</span></label>
          <button class="btn btn-primary w-100" type="submit"><i class="bi bi-shield-check"></i> Verify</button>
        </form>
        <div class="demo-logins">
          <span>Use the admin account created during installation.</span>
        </div>
      </main>
    </div>

    <div id="appView" class="app-shell d-none">
      <aside class="sidebar">
        <div class="sidebar-brand"><i class="bi bi-shield-lock"></i><span>Linux PAM Lite</span></div>
        <nav id="nav" class="nav flex-column"></nav>
      </aside>
      <div class="main-shell">
        <header class="topbar">
          <button id="mobileMenu" class="btn btn-outline-secondary btn-icon d-lg-none" type="button"><i class="bi bi-list"></i></button>
          <div>
            <div id="pageTitle" class="page-title">Dashboard</div>
            <div id="pageHint" class="page-hint">Privileged access overview</div>
          </div>
          <div class="topbar-actions">
            <button id="themeToggle" class="btn btn-outline-secondary btn-icon" type="button" title="Toggle theme"><i class="bi bi-moon-stars"></i></button>
            <span id="currentUser" class="user-pill"></span>
            <button id="logoutBtn" class="btn btn-outline-danger btn-icon" type="button" title="Logout"><i class="bi bi-box-arrow-right"></i></button>
          </div>
        </header>
        <main id="content" class="content"></main>
      </div>
    </div>

    <div class="modal fade" id="entityModal" tabindex="-1" aria-hidden="true">
      <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
          <div class="modal-header">
            <h5 id="entityModalTitle" class="modal-title"></h5>
            <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
          </div>
          <div id="entityModalBody" class="modal-body"></div>
          <div class="modal-footer">
            <button type="button" class="btn btn-outline-secondary" data-bs-dismiss="modal">Cancel</button>
            <button id="entityModalSave" type="button" class="btn btn-primary">Save</button>
          </div>
        </div>
      </div>
    </div>

    <div class="toast-container position-fixed bottom-0 end-0 p-3" id="toasts"></div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
