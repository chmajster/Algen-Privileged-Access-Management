<!doctype html>
<html lang="en" data-bs-theme="dark"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Algen PAM</title><link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"><link href="/static/styles.css" rel="stylesheet"></head>
<body><div id="toast" class="toastbox"></div>
<main class="container-fluid p-0">
  <section id="login" class="login-shell"><form id="loginForm" class="card p-4 shadow"><h1 class="h3">Algen PAM</h1><p class="text-secondary">Controlled multi-protocol access</p><input id="username" class="form-control mb-3" value="administrator" autocomplete="username" required><input id="password" type="password" class="form-control mb-3" value="admin123" autocomplete="current-password" required><button class="btn btn-primary">Sign in</button></form></section>
  <section id="shell" class="d-none"><header class="navbar border-bottom px-3"><a class="navbar-brand">Algen PAM</a><nav class="nav nav-pills" id="nav"><button data-view="resources" class="nav-link active">Resources</button><button data-view="requests" class="nav-link">Requests</button><button data-view="grants" class="nav-link">Grants</button><button data-view="sessions" class="nav-link">Sessions</button></nav><div><span id="identity" class="me-3 text-secondary"></span><button id="logout" class="btn btn-sm btn-outline-secondary">Logout</button></div></header>
    <div class="container-fluid py-4"><div id="filters" class="row g-2 mb-3"></div><div id="content"></div></div>
  </section>
  <section id="viewer" class="viewer d-none"><header><button id="closeViewer" class="btn btn-sm btn-outline-light">Back</button><strong id="viewerTitle"></strong><span id="viewerStatus" class="badge text-bg-success">active</span><button id="terminate" class="btn btn-sm btn-danger ms-auto">Terminate</button></header><div id="browserStage" class="browser-stage d-none"><img id="browserFrame" draggable="false" alt="Controlled browser frame"></div><div id="terminalStage" class="terminal-stage d-none"><pre id="terminalOutput"></pre><textarea id="terminalInput" rows="1" aria-label="Terminal input"></textarea></div></section>
  <section id="replay" class="container-fluid py-3 d-none"><div class="d-flex gap-2 align-items-center mb-3"><button id="closeReplay" class="btn btn-outline-secondary">Back</button><h2 class="h4 m-0" id="replayTitle">Session replay</h2><button id="replayTerminate" class="btn btn-danger ms-auto d-none">Terminate active session</button></div><div id="replayMeta" class="row g-2 mb-3"></div><div class="row"><div class="col-lg-8"><video id="replayVideo" class="w-100 bg-black" controls></video></div><div class="col-lg-4"><select id="eventFilter" class="form-select mb-2"><option value="">All events</option></select><div id="timeline" class="timeline"></div></div></div></section>
</main><script src="/static/app.js"></script></body></html>
